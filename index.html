<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosk-Steuerung – Freibad Schönbach</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
  <style>
    :root {
      --bg:     #0f1117;
      --bg2:    #1a1d27;
      --bg3:    #22263a;
      --border: rgba(255,255,255,0.10);
      --text:   #e8eaf0;
      --muted:  #7c8298;
      --blue:   #378add;
      --green:  #2dc653;
      --red:    #e63946;
      --amber:  #f59e0b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh; padding: 24px 16px 48px;
    }
    .container { max-width: 480px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header p  { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* Cards */
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; margin-bottom: 14px;
    }
    .card-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px;
    }

    /* Login */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      color: var(--text); font-size: 15px; width: 100%;
      outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--blue); }

    /* Buttons */
    .btn {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; font-family: inherit;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-green   { background: var(--green); color: white; }
    .btn-red     { background: var(--red); color: white; }
    .btn-outline {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
    .btn-sm {
      width: auto; padding: 9px 16px; font-size: 13px;
    }
    .btn-group { display: flex; gap: 10px; }
    .btn-group .btn { flex: 1; }

    /* Status pill */
    .status-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 50px; font-size: 14px; font-weight: 600;
      border: 1.5px solid;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .pill-open   { border-color: var(--green); color: var(--green); }
    .pill-closed { border-color: var(--red);   color: var(--red);   }

    /* Hinweis-Zeile */
    .hinweis-row { display: flex; gap: 8px; align-items: stretch; }
    .hinweis-row input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text);
      font-size: 14px; outline: none; font-family: inherit;
    }
    .hinweis-row input:focus { border-color: var(--blue); }

    /* Zeit-Zeile */
    .zeit-row { display: flex; gap: 8px; align-items: stretch; }
    .zeit-row input[type=time] {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text);
      font-size: 15px; outline: none; font-family: inherit; width: 120px;
    }

    /* Wochenvorschau */
    .vw-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 14px;
    }
    .vw-row:last-child { border-bottom: none; }
    .vw-tag  { font-weight: 600; width: 32px; }
    .vw-dat  { color: var(--muted); font-size: 13px; width: 44px; }
    .vw-tmp  { color: var(--amber); }
    .vw-bez  { font-size: 13px; }
    .vw-badge {
      font-size: 11px; font-weight: 700; padding: 3px 8px;
      border-radius: 20px; min-width: 44px; text-align: center;
    }
    .vw-green { background: rgba(45,198,83,0.15);  color: var(--green); }
    .vw-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
    .vw-red   { background: rgba(230,57,70,0.15);  color: var(--red);   }

    /* Msg */
    .msg {
      padding: 10px 14px; border-radius: 8px; font-size: 13px;
      margin-bottom: 10px; display: none; border-left: 3px solid;
    }
    .msg-ok  { background: rgba(45,198,83,0.1);  border-color: var(--green); color: #9fe1cb; }
    .msg-err { background: rgba(230,57,70,0.1);  border-color: var(--red);   color: #f7c1c1; }

    /* Abmelden */
    .logout-row { text-align: right; margin-bottom: 8px; }
    .logout-btn {
      background: none; border: none; color: var(--muted); font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .logout-btn:hover { color: var(--text); }

    /* Spinner */
    .loading { color: var(--muted); font-size: 14px; text-align: center; padding: 20px; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>🍦 Kiosk-Steuerung</h1>
      <p>Freibad Schönbach</p>
    </div>
  </div>

  <!-- Login -->
  <div id="loginSection">
    <div class="card">
      <div class="card-title">Anmelden</div>
      <div id="loginMsg" class="msg"></div>
      <div class="field">
        <label>Passwort</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" onclick="login()">Anmelden</button>
    </div>
  </div>

  <!-- Steuerung (nach Login) -->
  <div id="mainSection" style="display:none;">

    <div class="logout-row">
      <button class="logout-btn" onclick="logout()">Abmelden ✕</button>
    </div>

    <!-- Aktueller Status -->
    <div class="card">
      <div class="card-title">Aktueller Status</div>
      <div id="statusAnzeige" class="loading">Lade…</div>
    </div>

    <!-- Kiosk öffnen / schließen -->
    <div class="card">
      <div class="card-title">Status setzen</div>
      <div id="actionMsg" class="msg"></div>
      <div class="btn-group" style="margin-bottom:12px;">
        <button class="btn btn-green" onclick="send('open','')">✅ Geöffnet</button>
        <button class="btn btn-red"   onclick="send('closed','')">❌ Geschlossen</button>
      </div>

      <div class="card-title" style="margin-top:6px;">Öffnet um …</div>
      <div class="zeit-row">
        <input type="time" id="zeitInput" value="14:00">
        <button class="btn btn-outline btn-sm" onclick="sendZeit()">Setzen</button>
      </div>
    </div>

    <!-- Hinweis -->
    <div class="card">
      <div class="card-title">Hinweis</div>
      <div class="hinweis-row" style="margin-bottom:8px;">
        <input type="text" id="hinweisInput" placeholder="z.B. Heute nur Getränke">
        <button class="btn btn-outline btn-sm" onclick="sendHinweis()">Setzen</button>
      </div>
      <button class="btn btn-outline" onclick="send('hinweis_clear','')">🗑 Hinweis löschen</button>
    </div>

    <!-- Wochenvorschau -->
    <div class="card">
      <div class="card-title">Wochenvorschau Besucher</div>
      <div id="vorschauListe" class="loading">Lade…</div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = 'https://zdjoklybpuynmvuptrhu.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_ePim65bkplDkHjpJSKxePQ_TCCjiUr8';  // ersetzen mit anon key aus Supabase → Settings → API

  const { createClient } = window.supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── Auth ───────────────────────────────────────────────────────
  async function sha256(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function login() {
    const password = document.getElementById('password').value;
    if (!password) return;
    try {
      const hash = await sha256(password);
      const { data, error } = await sb.from('kiosk_pin').select('hash').eq('id', 1).single();
      if (error || !data) {
        showMsg('loginMsg', 'Fehler: ' + (error?.message || 'Keine Daten'), true);
        return;
      }
      if (hash !== data.hash) {
        showMsg('loginMsg', 'Hash: ' + hash, true);
        return;
      }
      sessionStorage.setItem('kiosk_auth', hash);
      showMain();
    } catch(e) {
      showMsg('loginMsg', 'Fehler: ' + e.message, true);
    }
  }

  function logout() {
    sessionStorage.removeItem('kiosk_auth');
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('mainSection').style.display  = 'none';
  }

  async function checkSession() {
    const stored = sessionStorage.getItem('kiosk_auth');
    if (!stored) return;
    const { data } = await sb.from('kiosk_pin').select('hash').eq('id', 1).single();
    if (data && stored === data.hash) showMain();
    else sessionStorage.removeItem('kiosk_auth');
  }

  function showMain() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('mainSection').style.display  = 'block';
    loadStatus();
    loadVorschau();
  }

  // ── Status laden ───────────────────────────────────────────────
  async function loadStatus() {
    const el = document.getElementById('statusAnzeige');
    try {
      const { data, error } = await sb.from('kiosk').select('*').eq('id', 'schoenbach').single();
      if (error || !data) { el.textContent = 'Keine Daten'; return; }
      const offen = data.status === 'open';
      el.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <span class="status-pill ${offen ? 'pill-open' : 'pill-closed'}">
            <span class="status-dot"></span>
            ${offen ? 'Geöffnet' : 'Geschlossen'}
          </span>
          ${data.hinweis ? `<span style="font-size:13px;color:var(--muted)">${data.hinweis}</span>` : ''}
        </div>`;
    } catch (e) {
      el.textContent = 'Fehler beim Laden';
    }
  }

  // ── Befehle senden ─────────────────────────────────────────────
  async function send(aktion, wert) {
    const { error } = await sb.from('kiosk_commands').insert({ aktion, wert });
    if (error) {
      showMsg('actionMsg', 'Fehler: ' + error.message, true);
    } else {
      showMsg('actionMsg', '✅ Befehl gesendet – wird in ~30 Sek. aktiv.', false);
      setTimeout(loadStatus, 5000);
    }
  }

  function sendZeit() {
    const zeit = document.getElementById('zeitInput').value;
    if (!zeit) return;
    send('oeffnet_um', zeit);
  }

  function sendHinweis() {
    const text = document.getElementById('hinweisInput').value.trim();
    if (!text) return;
    send('hinweis', text);
    document.getElementById('hinweisInput').value = '';
  }

  // ── Wochenvorschau ─────────────────────────────────────────────
  async function loadVorschau() {
    const el = document.getElementById('vorschauListe');
    try {
      const { data, error } = await sb.from('wochenvorschau').select('*').order('id');
      if (error || !data || data.length === 0) {
        el.textContent = 'Keine Vorschau-Daten (Pi schreibt alle 5 Min.)';
        return;
      }
      el.innerHTML = data.map(t => {
        const cls = t.tages_max >= 20 ? 'vw-green' : t.tages_max >= 10 ? 'vw-amber' : 'vw-red';
        const extras = [
          t.regen > 1 ? `🌧 ${t.regen}mm` : '',
          t.feiertag ? '🎉 Feiertag' : '',
          t.ferien   ? '🏖 Ferien'   : '',
        ].filter(Boolean).join(' · ');
        return `
          <div class="vw-row">
            <span class="vw-tag">${t.wochentag}</span>
            <span class="vw-dat">${t.datum}</span>
            <span class="vw-tmp">${Math.round(t.temp_max)}°C</span>
            <span class="vw-bez" style="flex:1;padding:0 8px;color:var(--muted)">${extras}</span>
            <span class="vw-badge ${cls}">~${t.tages_max}</span>
          </div>`;
      }).join('');
    } catch (e) {
      el.textContent = 'Fehler beim Laden';
    }
  }

  // ── Hilfsfunktionen ────────────────────────────────────────────
  function showMsg(id, text, error) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + (error ? 'msg-err' : 'msg-ok');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });


  checkSession();
</script>
</body>
</html>
